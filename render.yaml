services:
  - type: web
    name: portfolio-resume-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: MAX_UPLOAD_SIZE_MB
        value: 5
      - key: RESUME_OBJECT_KEY
        value: resume/ResumeAtif.pdf
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://your-portfolio-domain.vercel.app
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        value: https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      - key: S3_BUCKET_NAME
        value: portfolio-resume
      - key: S3_ACCESS_KEY_ID
        value: your-r2-access-key-id
      - key: S3_SECRET_ACCESS_KEY
        value: your-r2-secret-access-key
      - key: S3_PUBLIC_URL_BASE
        value: https://your-public-r2-url/
      - key: S3_FORCE_PATH_STYLE
        value: "false"
